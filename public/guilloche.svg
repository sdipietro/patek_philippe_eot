<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Guilloché texture">
  <defs>
    <pattern id="grid" width="200" height="200" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#0D1B2A" stroke-width="0.4" opacity="0.18">
        
        <g>
          <circle cx="100" cy="100" r="10"></circle>
          <circle cx="100" cy="100" r="22"></circle>
          <circle cx="100" cy="100" r="34"></circle>
          <circle cx="100" cy="100" r="46"></circle>
          <circle cx="100" cy="100" r="58"></circle>
          <circle cx="100" cy="100" r="70"></circle>
          <circle cx="100" cy="100" r="82"></circle>
          <circle cx="100" cy="100" r="94"></circle>
        </g>
        
        <g>
          <g transform="rotate(0 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(15 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(30 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(45 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(60 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(75 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(90 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(105 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(120 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(135 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(150 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
          <g transform="rotate(165 100 100)"><line x1="100" y1="6" x2="100" y2="194"></line></g>
        </g>
      </g>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#grid)"></rect>
</svg>